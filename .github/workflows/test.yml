name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  wrapper-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run wrapper tests
        run: bash tests/test-omx-bridge.sh
